<!-- Twikoo -->
<div>    
    <div class="pagination__title">
        <span class="pagination__title-h" style="font-size: 24px;color: var(--content);"><br><br>💬 评论</span>
        <hr />
    </div>
    <div id="tcomment"></div>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.27/dist/katex.min.css">
    <!-- The loading of KaTeX is deferred to speed up page rendering -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.27/dist/katex.min.js"></script>
    <!-- To automatically render math in text elements, include the auto-render extension: -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.27/dist/contrib/auto-render.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/twikoo@{{ .Site.Params.twikoo.version }}/dist/twikoo.all.min.js"></script>
    <script>
        twikoo.init({
            envId: "{{ .Site.Params.twikoo.id }}",  //这里填写自己的envId
            el: "#tcomment",
            lang: 'zh-CN',
            region: "{{ .Site.Params.twikoo.region }}",
            // path: 'window.TWIKOO_MAGIC_PATH||window.location.pathname',
        });
    </script>
</div>
